[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    layer3: Layer 3 demo tests (proves what KRNX enables)
    temporal: Temporal replay tests (THE DIFFERENTIATOR)
    hashchain: Hash chain integrity tests
    multiagent: Multi-agent coordination tests
    benchmark: Benchmark tests (LOCOMO, LongMemEval)
    requires_llm: Requires LLM API key (OpenAI or Anthropic)
    requires_redis: Requires Redis server
    requires_qdrant: Requires Qdrant vector store
    failure_mode: Failure mode tests
    slow: Slow tests (>30 seconds)

# Default options
addopts = -v --tb=short -x

# Timeout for each test (in seconds)
timeout = 300

# Output
console_output_style = progress
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %H:%M:%S

# Async mode
asyncio_mode = auto
