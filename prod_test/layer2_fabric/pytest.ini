[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    layer2: Layer 2 fabric tests
    requires_redis: Tests requiring Redis connection
    slow: Slow tests (>10s)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
